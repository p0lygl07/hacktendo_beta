<!DOCTYPE html>
<html>
<head>
    <meta name="node-id" content="OMNI_GATEKEEPER_v4">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 90vh; margin: 0; }
        .login-box { border: 1px solid #0f0; padding: 30px; background: #050505; width: 300px; text-align: center; box-shadow: 0 0 20px #030; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; margin: 10px 0; width: 80%; outline: none; }
        button { background: #0f0; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 88%; }
        button:hover { background: #0a0; }
        .status { margin-top: 15px; font-size: 12px; height: 20px; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2 style="color: red;">OMNI-GUARD LOGIN</h2>
        <input type="text" id="user" placeholder="STAFF_ID (e.g. OC-0000)">
        <input type="password" id="pass" placeholder="SECURITY_BYPASS">
        <button onclick="checkLogin()">INITIATE ACCESS</button>
        <div id="status" class="status"></div>
    </div>

    <script>
        function checkLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const s = document.getElementById('status');

            if (u === "OC-0042" && p === "NEBULA_VOID_88") {
                s.style.color = "gold";
                s.innerText = "ACCESS GRANTED. Redirecting to Deep Grid...";
                setTimeout(() => {
                    window.location.href = "/v-net/omnicorp/nebula_vault";
                }, 1500);
            } else {
                s.style.color = "red";
                s.innerText = "INVALID CREDENTIALS. TRACE INITIATED.";
            }
        }
    </script>
</body>
</html>
